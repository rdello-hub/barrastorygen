    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f0f1a;font-family:'Sora','Inter',system-ui,sans-serif;color:#e0e0e0}
    textarea:focus,input:focus,select:focus{border-color:#c850c0!important;outline:none}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#1a1a2e}::-webkit-scrollbar-thumb{background:#3d3d5c;border-radius:3px}
    .vb{opacity:.5;transition:opacity .15s}.vb.a{opacity:1;background:#2d2d4a!important}.vb:hover{opacity:.8}
    .topbar{padding:12px 16px;border-bottom:1px solid #1e1e35;display:flex;align-items:center;justify-content:space-between;background:#13132a;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}
    .topbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .topbar-right{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
    .view-btn{padding:5px 12px;background:transparent;border:none;color:#e0e0e0;font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border-radius:6px;font-weight:600}
    .divider-v{width:1px;height:20px;background:#2d2d4a;margin:0 6px}
    .btn-export{padding:5px 14px;background:linear-gradient(90deg,#ff6b35,#e84393);border:none;color:white;font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border-radius:6px;font-weight:700}
    .btn-export:disabled{opacity:.5;cursor:not-allowed;background:#2d2d4a}
    .btn-sm{padding:5px 10px;background:#1a1a2e;border:1px solid #2d2d4a;color:#c0c0d0;font-size:11px;cursor:pointer;border-radius:6px;font-weight:600}
    .btn-sm:hover{border-color:#c850c0}
    .btn-undo{padding:4px 8px;background:#1a1a2e;border:1px solid #2d2d4a;color:#c0c0d0;font-size:13px;cursor:pointer;border-radius:6px}
    .btn-undo:disabled{opacity:.3;cursor:not-allowed}.btn-undo:hover:not(:disabled){border-color:#c850c0}
    .badge-info{font-size:11px;color:#6b6b8a;background:#1a1a2e;padding:2px 8px;border-radius:4px}
    .main-split{display:flex;height:calc(100vh - 49px)}
    .editor-panel{padding:16px;overflow-y:auto;border-right:1px solid #1e1e35;max-height:calc(100vh - 49px)}
    .preview-panel{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;background:#0a0a14;max-height:calc(100vh - 49px)}
    .iS{width:100%;padding:10px 14px;background:#1a1a2e;border:1px solid #2d2d4a;border-radius:8px;color:#e0e0e0;font-size:14px;font-family:inherit;resize:vertical;outline:none}
    .lS{font-size:11px;font-weight:600;color:#8b8ba7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
    .field-group{margin-bottom:14px}
    .preset-browser{margin-bottom:16px;background:#13132a;border-radius:10px;border:1px solid #1e1e35;padding:12px;max-height:400px;overflow-y:auto}
    .preset-row{padding:8px 10px;background:#1a1a2e;border:1px solid #2d2d4a;border-radius:6px;color:#e0e0e0;font-size:12px;cursor:pointer;text-align:left;display:flex;gap:8px;align-items:center;width:100%}
    .preset-row:hover{border-color:#c850c0}
    .preset-row.custom{border-left:3px solid #ff6b35}
    .preset-check{width:16px;height:16px;accent-color:#c850c0;cursor:pointer;flex-shrink:0}
    .btn-add-bullet{padding:6px 14px;border-radius:8px;border:1px dashed #2d2d4a;background:#1a1a2e;color:#c850c0;font-size:12px;cursor:pointer;font-weight:600}
    .btn-remove{background:transparent;border:none;color:#ff4757;font-size:16px;cursor:pointer;padding:6px 8px}
    .bullet-drag-handle{cursor:grab;color:#6b6b8a;font-size:16px;padding:4px 4px;user-select:none;line-height:1}
    .bullet-drag-handle:active{cursor:grabbing}
    .bullet-row{transition:border-top .1s,opacity .15s}
    .bullet-row.drag-over{border-top:2px solid #c850c0!important}
    .overflow-badge{position:absolute;top:8px;right:8px;background:#ff4757;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;z-index:2}
    .overflow-warning{padding:8px 12px;background:rgba(255,71,87,.15);border:1px solid #ff4757;border-radius:8px;color:#ff4757;font-size:12px;margin-bottom:14px}
    .help-box{padding:12px;background:#13132a;border-radius:8px;border:1px solid #1e1e35;font-size:12px;color:#6b6b8a;line-height:1.5}
    .fullscreen-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .fullscreen-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.2);border:none;color:white;font-size:24px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .fullscreen-close:hover{background:rgba(255,255,255,.3)}
    .batch-bar{padding:8px 12px;background:#1a1a2e;border-radius:8px;border:1px solid #2d2d4a;margin-bottom:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .batch-btn{padding:4px 10px;background:#2d2d4a;border:none;color:#e0e0e0;font-size:11px;cursor:pointer;border-radius:4px;font-weight:600}
    .batch-btn:hover{background:#3d3d5c}
    .batch-btn.primary{background:linear-gradient(90deg,#ff6b35,#e84393);color:white}
    .batch-btn.primary:disabled{opacity:.5;cursor:not-allowed}
    .batch-progress{font-size:11px;color:#c850c0;font-weight:600}
    .nav-btn{padding:5px 10px;background:#1a1a2e;border:1px solid #2d2d4a;color:#c0c0d0;font-size:13px;cursor:pointer;border-radius:6px;font-weight:700}
    .nav-btn:hover{border-color:#c850c0}.nav-btn:disabled{opacity:.3;cursor:not-allowed}
    .nav-pos{font-size:11px;color:#8b8ba7;padding:0 4px}
    .color-input{width:36px;height:28px;border:1px solid #2d2d4a;border-radius:4px;background:#1a1a2e;cursor:pointer;padding:2px}
    @media(max-width:767px){
      .main-split{flex-direction:column;height:auto}
      .editor-panel{max-height:none;border-right:none;border-bottom:1px solid #1e1e35;flex:none!important;width:100%}
      .preview-panel{max-height:none;min-height:60vh}
      .topbar{padding:8px 12px}
      .topbar-left,.topbar-right{width:100%;justify-content:center}
    }
    @media(min-width:768px) and (max-width:1200px){
      .editor-panel.split-mode{flex:0 0 50%!important}
    }
  </style>

  <!-- ============================================= -->
  <!-- SECTION 2: APPLICATION (React + Babel)        -->
  <!-- ============================================= -->
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef, useLayoutEffect } = React;

    // =============================================
    // CONSTANTS & UTILITIES
    // =============================================
    const LAYOUTS = window.CR_LAYOUTS;
    const BUILTIN_PRESETS = window.CR_PRESETS;
    const DEFAULT_COLORS = ["#ff6b35", "#e84393", "#c850c0"];

    const makeGrads = (colors) => [
      `linear-gradient(90deg, ${colors[0]}, ${colors[1]})`,
      `linear-gradient(90deg, ${colors[1]}, ${colors[2]})`,
      `linear-gradient(90deg, ${colors[2]}, ${colors[0]})`,
    ];

    const parseHL = (text, type, colors) => {
      if (!text) return null;
      const GRADS = makeGrads(colors || DEFAULT_COLORS);
      const TEXT_COLORS = colors || DEFAULT_COLORS;
      let idx = 0;
      return text.split(/(\{[^}]+\})/g).map((part, i) => {
        if (part.startsWith("{") && part.endsWith("}")) {
          const w = part.slice(1, -1), g = GRADS[idx % GRADS.length], c = TEXT_COLORS[idx % TEXT_COLORS.length];
          idx++;
          return type === "bg"
            ? <span key={i} style={{position:"relative",display:"inline-block",padding:"0 8px"}}>
                <span style={{position:"absolute",bottom:"4px",left:0,right:0,height:"25%",borderRadius:"8px",background:g}}/>
                <span style={{position:"relative"}}>{w}</span>
              </span>
            : <span key={i} style={{color:c,fontWeight:700}}>{w}</span>;
        }
        return part;
      });
    };

    const emptyStory = (layout) => ({
      layout, title: "Il tuo {titolo} qui", subtitle: "", bullets: ["Primo punto", "Secondo punto", "Terzo punto"],
      par1: "Testo {principale} del primo paragrafo.", par2: "Testo del {secondo} paragrafo.", par3: "",
      titleSize: 78, imageUrl: "", bodyFontSize: 34, bulletFontSize: 36,
    });

    const LS_DRAFT = "cr-draft-v5";
    const LS_CUSTOM = "cr-custom-presets-v5";
    const LS_COLORS = "cr-colors-v5";

    const loadLS = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
    const saveLS = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

    // =============================================
    // PREVIEW COMPONENTS
    // =============================================
    const BulletIcon = ({s=1, colors}) => {
      const size = 20*s;
      const c = colors || DEFAULT_COLORS;
      return (
        <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${c[0]},${c[1]},${c[2]})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <div style={{width:0,height:0,borderStyle:"solid",borderWidth:`${size*0.22}px 0 ${size*0.22}px ${size*0.35}px`,borderColor:"transparent transparent transparent white",marginLeft:size*0.06}}/>
        </div>
      );
    };

    const BulletList = ({bullets, bulletFontSize=36, bodyFontWeight=700, colors}) => {
      const filtered = (bullets||[]).filter(b=>b.trim());
      if (!filtered.length) return null;
      return (
        <div style={{display:"flex",flexDirection:"column",gap:28,marginBottom:36}}>
          {filtered.map((b,i)=>(
            <div key={i} style={{display:"flex",alignItems:"flex-start",gap:16}}>
              <div style={{marginTop:6,flexShrink:0}}><BulletIcon s={1.5} colors={colors}/></div>
              <span style={{fontSize:bulletFontSize,fontWeight:bodyFontWeight,lineHeight:1.3}}>{b}</span>
            </div>
          ))}
        </div>
      );
    };

    const Par = ({text, mb=24, bodyFontSize=34, bodyFontWeight=700, colors}) => {
      if (!text) return null;
      return <p style={{fontSize:bodyFontSize,fontWeight:bodyFontWeight,lineHeight:1.35,margin:`0 0 ${mb}px 0`,whiteSpace:"pre-line"}}>{parseHL(text,"text",colors)}</p>;
    };

    const CenteredImg = ({src}) => {
      if (!src) return null;
      return (
        <div style={{margin:"16px 0 24px",borderRadius:20,overflow:"hidden",background:"#1a1a2e",maxHeight:520,minHeight:200,flexShrink:0}}>
          <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
        </div>
      );
    };

    const Preview = ({d, pw=340, exportMode=false, innerRef, contentRef, colors}) => {
      const s = pw/1080;
      const ly = d.layout || "A";
      const hasBullets = d.bullets?.filter(b=>b.trim()).length > 0;
      const hasImg = !!d.imageUrl;
      const bfs = d.bodyFontSize || 34;
      const bfw = d.bodyFontWeight || 700;
      const blfs = d.bulletFontSize || 36;
      const c = colors || DEFAULT_COLORS;

      return (
        <div ref={innerRef} style={{width:pw,height:pw*(1920/1080),overflow:"hidden",...(exportMode?{}:{borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}),flexShrink:0}}>
          <div style={{width:1080,height:1920,transform:`scale(${s})`,transformOrigin:"top left",background:"#0a0a0a",fontFamily:"'Sora',sans-serif",color:"white",padding:"60px 56px 50px",display:"flex",flexDirection:"column",boxSizing:"border-box"}}>

            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:40,justifyContent:"center"}}>
              <img src={CR_LOGO} alt="CR" style={{width:62,height:62,objectFit:"contain"}}/>
              <div style={{width:2.5,height:48,background:"rgba(255,255,255,0.4)"}}/>
              <div style={{fontSize:30,fontWeight:500,letterSpacing:"1.5px",color:"white",lineHeight:1.25,fontFamily:"'Made Tommy',sans-serif"}}>EDOARDO<br/>BARRAVECCHIA</div>
            </div>

            {/* Title */}
            <h1 style={{fontSize:d.titleSize||78,fontWeight:900,lineHeight:1.08,margin:"0 0 36px 0",letterSpacing:"-1px"}}>{parseHL(d.title,"bg",c)}</h1>

            {/* Subtitle */}
            {d.subtitle && <p style={{fontSize:bfs,fontWeight:500,lineHeight:1.3,margin:"0 0 28px 0",color:"rgba(255,255,255,0.75)"}}>{d.subtitle}</p>}

            {/* Content area with ref for overflow measurement */}
            <div ref={contentRef} style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>

              {ly==="A" && <>
                {hasBullets && <BulletList bullets={d.bullets} bulletFontSize={blfs} bodyFontWeight={bfw} colors={c}/>}
                {hasImg && <CenteredImg src={d.imageUrl}/>}
                <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                <Par text={d.par2} mb={0} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
              </>}

              {ly==="B" && <>
                {hasBullets && <BulletList bullets={d.bullets} bulletFontSize={blfs} bodyFontWeight={bfw} colors={c}/>}
                <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                {hasImg && <CenteredImg src={d.imageUrl}/>}
                <Par text={d.par2} mb={0} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
              </>}

              {ly==="C" && <>
                {hasBullets && <BulletList bullets={d.bullets} bulletFontSize={blfs} bodyFontWeight={bfw} colors={c}/>}
                <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                <Par text={d.par2} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                <Par text={d.par3} mb={0} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
              </>}

              {ly==="D" && <>
                <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                {hasImg && <CenteredImg src={d.imageUrl}/>}
                <Par text={d.par2} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                <Par text={d.par3} mb={0} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
              </>}

              {ly==="E" && <>
                {hasBullets && <BulletList bullets={d.bullets} bulletFontSize={blfs} bodyFontWeight={bfw} colors={c}/>}
                <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                <div style={{display:"flex",gap:24,alignItems:"flex-start"}}>
                  {d.par2 && <div style={{flex:1}}><p style={{fontSize:bfs,fontWeight:bfw,lineHeight:1.35,margin:0,whiteSpace:"pre-line"}}>{parseHL(d.par2,"text",c)}</p></div>}
                  {hasImg && <div style={{width:380,height:380,borderRadius:20,overflow:"hidden",flexShrink:0,background:"#1a1a2e"}}><img src={d.imageUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
                </div>
              </>}

              {ly==="F" && <>
                {hasBullets && <BulletList bullets={d.bullets} bulletFontSize={blfs} bodyFontWeight={bfw} colors={c}/>}
                <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                <Par text={d.par2} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                {hasImg && (
                  <div style={{margin:"8px 0 0",borderRadius:20,overflow:"hidden",background:"#1a1a2e",maxHeight:440,minHeight:200,flexShrink:0}}>
                    <img src={d.imageUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  </div>
                )}
              </>}

              {ly==="G" && <>
                {hasBullets && <BulletList bullets={d.bullets} bulletFontSize={blfs} bodyFontWeight={bfw} colors={c}/>}
                {hasImg && <CenteredImg src={d.imageUrl}/>}
                <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                <Par text={d.par2} mb={0} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
              </>}

              {ly==="H" && <>
                {hasBullets && <BulletList bullets={d.bullets} bulletFontSize={blfs} bodyFontWeight={bfw} colors={c}/>}
                <div style={{display:"flex",gap:24,alignItems:"stretch"}}>
                  <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-start"}}>
                    <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                    <Par text={d.par2} mb={0} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                  </div>
                  {hasImg && <div style={{width:420,borderRadius:20,overflow:"hidden",flexShrink:0,background:"#1a1a2e"}}><img src={d.imageUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
                </div>
              </>}

              {ly==="I" && <>
                <div style={{display:"flex",gap:24,alignItems:"stretch",marginBottom:d.par3?24:0}}>
                  <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-start"}}>
                    <Par text={d.par1} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                    <Par text={d.par2} mb={0} bodyFontSize={bfs} bodyFontWeight={bfw} colors={c}/>
                  </div>
                  {hasImg && <div style={{width:420,borderRadius:20,overflow:"hidden",flexShrink:0,background:"#1a1a2e"}}><img src={d.imageUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
                </div>
                {d.par3 && <p style={{fontSize:bfs,fontWeight:bfw,lineHeight:1.35,margin:0,whiteSpace:"pre-line"}}>{parseHL(d.par3,"text",c)}</p>}
              </>}
            </div>

            {/* Footer */}
            <div style={{marginTop:"auto",paddingTop:40,textAlign:"center",fontSize:24,fontWeight:500,letterSpacing:"1.5px",color:"white",fontFamily:"'Made Tommy',sans-serif",flexShrink:0}}>
              <div>WWW.CONSULTINGREVOLUTION.AGENCY</div>
              <div style={{marginTop:6}}>INFO@CONSULTINGREVOLUTION.AGENCY</div>
            </div>
          </div>
        </div>
      );
    };

    // =============================================
    // MAIN APPLICATION
    // =============================================
    function App() {
      // --- Custom presets from localStorage ---
      const [customPresets, setCustomPresets] = useState(() => loadLS(LS_CUSTOM, []));
      const allPresets = useMemo(() => [...BUILTIN_PRESETS, ...customPresets], [customPresets]);

      // --- Colors ---
      const [colors, setColors] = useState(() => loadLS(LS_COLORS, [...DEFAULT_COLORS]));
      useEffect(() => saveLS(LS_COLORS, colors), [colors]);

      // --- Story state ---
      const defaultStory = emptyStory("A");
      const [d, setD] = useState(() => loadLS(LS_DRAFT, defaultStory));
      useEffect(() => saveLS(LS_DRAFT, d), [d]);

      // --- History (undo/redo) ---
      const [history, setHistory] = useState([d]);
      const [historyIdx, setHistoryIdx] = useState(0);
      const pushHistory = useCallback((newD) => {
        setHistory(prev => {
          const trimmed = prev.slice(0, historyIdx + 1);
          const next = [...trimmed, newD].slice(-50);
          setHistoryIdx(next.length - 1);
          return next;
        });
      }, [historyIdx]);

      const undo = useCallback(() => {
        if (historyIdx > 0) {
          const newIdx = historyIdx - 1;
          setHistoryIdx(newIdx);
          setD(history[newIdx]);
        }
      }, [historyIdx, history]);

      const redo = useCallback(() => {
        if (historyIdx < history.length - 1) {
          const newIdx = historyIdx + 1;
          setHistoryIdx(newIdx);
          setD(history[newIdx]);
        }
      }, [historyIdx, history]);

      useEffect(() => {
        const handler = (e) => {
          if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
          if (e.ctrlKey && e.key === 'z' && e.shiftKey) { e.preventDefault(); redo(); }
          if (e.ctrlKey && e.key === 'Z') { e.preventDefault(); redo(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [undo, redo]);

      // --- UI state ---
      const [view, setView] = useState("split");
      const [search, setSearch] = useState("");
      const [showPresets, setShowPresets] = useState(false);
      const [filterLayout, setFilterLayout] = useState("all");
      const [exporting, setExporting] = useState(false);
      const [h2cReady, setH2cReady] = useState(false);
      const [currentPresetIdx, setCurrentPresetIdx] = useState(0);
      const [fullscreen, setFullscreen] = useState(false);
      const [overflow, setOverflow] = useState(false);
      const [overflowH, setOverflowH] = useState(0);
      const [batchSelected, setBatchSelected] = useState(new Set());
      const [batchExporting, setBatchExporting] = useState(false);
      const [batchProgress, setBatchProgress] = useState("");
      const [mobileView, setMobileView] = useState("edit");
      const [dragIdx, setDragIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);

      const fileRef = useRef(null);
      const exportRef = useRef(null);
      const overflowRef = useRef(null);
      const batchExportRef = useRef(null);

      // --- html2canvas loading ---
      useEffect(() => {
        if (window.html2canvas) { setH2cReady(true); return; }
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload = () => setH2cReady(true);
        s.onerror = () => console.error("html2canvas failed to load");
        document.head.appendChild(s);
      }, []);

      // --- Overflow detection (measured on hidden full-size 1080px export preview) ---
      useEffect(() => {
        const timer = setTimeout(() => {
          if (overflowRef.current) {
            const el = overflowRef.current;
            // scrollHeight = full content height, clientHeight = visible (flex-allocated) height
            if (el.scrollHeight > el.clientHeight + 5) {
              setOverflow(true);
              setOverflowH(Math.round(el.scrollHeight));
            } else {
              setOverflow(false);
              setOverflowH(0);
            }
          }
        }, 300);
        return () => clearTimeout(timer);
      }, [d]);

      // --- Update function with history ---
      const updateD = useCallback((updater) => {
        setD(prev => {
          const next = typeof updater === 'function' ? updater(prev) : {...prev, ...updater};
          pushHistory(next);
          return next;
        });
      }, [pushHistory]);

      const up = useCallback((f,v) => updateD(p=>({...p,[f]:v})),[updateD]);
      const upB = useCallback((idx,v) => updateD(p=>{const b=[...(p.bullets||[])];b[idx]=v;return{...p,bullets:b}}),[updateD]);
      const addB = useCallback(() => updateD(p=>({...p,bullets:[...(p.bullets||[]),""]})),[updateD]);
      const rmB = useCallback((idx) => updateD(p=>({...p,bullets:(p.bullets||[]).filter((_,i)=>i!==idx)})),[updateD]);
      const onBulletDragEnd = useCallback(() => {
        if (dragIdx !== null && dragOverIdx !== null && dragIdx !== dragOverIdx) {
          updateD(p => {
            const b = [...(p.bullets || [])];
            const [dragged] = b.splice(dragIdx, 1);
            b.splice(dragOverIdx, 0, dragged);
            return {...p, bullets: b};
          });
        }
        setDragIdx(null);
        setDragOverIdx(null);
      }, [dragIdx, dragOverIdx, updateD]);

      // --- Export single PNG ---
      const exportPNG = useCallback(async () => {
        if (!exportRef.current || !window.html2canvas) return;
        setExporting(true);
        try {
          await new Promise(r => setTimeout(r, 200));
          const canvas = await window.html2canvas(exportRef.current, {width:1080,height:1920,scale:1,useCORS:true,backgroundColor:"#0a0a0a",logging:false});
          const link = document.createElement("a");
          link.download = `cr-story-${d.id||"custom"}-${Date.now()}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();
        } catch(e) { console.error("Export error:",e); }
        setExporting(false);
      }, [d.id]);

      // --- Batch export ---
      const batchExport = useCallback(async () => {
        if (!window.html2canvas || batchSelected.size === 0) return;
        setBatchExporting(true);
        const selectedIds = [...batchSelected];
        const presetsToExport = allPresets.filter(p => selectedIds.includes(p.id));
        for (let i = 0; i < presetsToExport.length; i++) {
          setBatchProgress(`Esportando ${i+1}/${presetsToExport.length}...`);
          // Temporarily set the export ref data
          const preset = {...presetsToExport[i], imageUrl: "", bodyFontSize: d.bodyFontSize || 34, bodyFontWeight: d.bodyFontWeight || 700, bulletFontSize: d.bulletFontSize || 36};
          // We need to render this preset in the hidden export area
          // Use a temporary approach: update state, wait, capture
          setD(prev => {
            window.__batchPrev = prev;
            return preset;
          });
          await new Promise(r => setTimeout(r, 400));
          try {
            if (exportRef.current) {
              const canvas = await window.html2canvas(exportRef.current, {width:1080,height:1920,scale:1,useCORS:true,backgroundColor:"#0a0a0a",logging:false});
              const link = document.createElement("a");
              link.download = `cr-story-${preset.id}-${Date.now()}.png`;
              link.href = canvas.toDataURL("image/png");
              link.click();
            }
          } catch(e) { console.error("Batch export error for id", preset.id, e); }
          await new Promise(r => setTimeout(r, 200));
        }
        // Restore previous state
        if (window.__batchPrev) {
          setD(window.__batchPrev);
          delete window.__batchPrev;
        }
        setBatchExporting(false);
        setBatchProgress("");
      }, [batchSelected, allPresets, d.bodyFontSize, d.bodyFontWeight, d.bulletFontSize]);

      // --- Preset navigation ---
      const presetNav = useCallback((dir) => {
        const newIdx = Math.max(0, Math.min(allPresets.length - 1, currentPresetIdx + dir));
        setCurrentPresetIdx(newIdx);
        const p = allPresets[newIdx];
        updateD({...p, imageUrl: d.imageUrl || "", bodyFontSize: d.bodyFontSize || 34, bodyFontWeight: d.bodyFontWeight || 700, bulletFontSize: d.bulletFontSize || 36});
      }, [currentPresetIdx, allPresets, d.imageUrl, d.bodyFontSize, d.bodyFontWeight, d.bulletFontSize, updateD]);

      // --- Load preset ---
      const loadPreset = useCallback((p, idx) => {
        updateD({...p, imageUrl: d.imageUrl || "", bodyFontSize: d.bodyFontSize || 34, bodyFontWeight: d.bodyFontWeight || 700, bulletFontSize: d.bulletFontSize || 36});
        if (idx !== undefined) setCurrentPresetIdx(idx);
        setShowPresets(false);
      }, [d.imageUrl, d.bodyFontSize, d.bodyFontWeight, d.bulletFontSize, updateD]);

      // --- Custom preset management ---
      const saveAsCustom = useCallback(() => {
        const nextId = customPresets.length > 0 ? Math.max(...customPresets.map(p=>p.id)) + 1 : 1000;
        const custom = {...d, id: nextId, imageUrl: undefined};
        const updated = [...customPresets, custom];
        setCustomPresets(updated);
        saveLS(LS_CUSTOM, updated);
      }, [d, customPresets]);

      const duplicatePreset = useCallback(() => {
        const nextId = customPresets.length > 0 ? Math.max(...customPresets.map(p=>p.id)) + 1 : 1000;
        const dup = {...d, id: nextId, imageUrl: undefined, title: d.title + " (copia)"};
        const updated = [...customPresets, dup];
        setCustomPresets(updated);
        saveLS(LS_CUSTOM, updated);
      }, [d, customPresets]);

      const deleteCustom = useCallback((id) => {
        const updated = customPresets.filter(p => p.id !== id);
        setCustomPresets(updated);
        saveLS(LS_CUSTOM, updated);
      }, [customPresets]);

      // --- Filtered presets ---
      const filtered = useMemo(()=>{
        let r = allPresets;
        if(filterLayout!=="all") r = r.filter(p=>p.layout===filterLayout);
        if(search.trim()) r = r.filter(p=>p.title.replace(/[{}]/g,"").toLowerCase().includes(search.toLowerCase()));
        return r;
      },[search, filterLayout, allPresets]);

      // --- Batch selection ---
      const toggleBatchItem = useCallback((id) => {
        setBatchSelected(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      }, []);
      const selectAll = useCallback(() => setBatchSelected(new Set(filtered.map(p=>p.id))), [filtered]);
      const deselectAll = useCallback(() => setBatchSelected(new Set()), []);

      const ly = d.layout || "A";
      const showBullets = ly!=="D" && ly!=="I";
      const showPar3 = ly==="C"||ly==="D"||ly==="I";
      const isSmall = typeof window !== 'undefined' && window.innerWidth < 768;

      return (
        <div style={{minHeight:"100vh",background:"#0f0f1a",fontFamily:"'Sora','Inter',system-ui,sans-serif",color:"#e0e0e0"}}>

          {/* ========== TOP BAR ========== */}
          <div className="topbar">
            <div className="topbar-left">
              <svg width={28} height={28} viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="16" stroke="white" strokeWidth="2.5"/><text x="18" y="23" textAnchor="middle" fill="white" style={{fontSize:"16px",fontWeight:800}}>CR</text></svg>
              <span style={{fontWeight:700,fontSize:14,color:"#fff"}}>Story Generator v5</span>
              <span className="badge-info">9 layout</span>

              {/* Undo/Redo */}
              <div className="divider-v"/>
              <button className="btn-undo" onClick={undo} disabled={historyIdx<=0} title="Undo (Ctrl+Z)">&#x21A9;</button>
              <button className="btn-undo" onClick={redo} disabled={historyIdx>=history.length-1} title="Redo (Ctrl+Shift+Z)">&#x21AA;</button>
            </div>
            <div className="topbar-right">
              {/* View toggle */}
              {isSmall ? (
                <>
                  <button className={`view-btn vb ${mobileView==="edit"?"a":""}`} onClick={()=>setMobileView("edit")}>Editor</button>
                  <button className={`view-btn vb ${mobileView==="preview"?"a":""}`} onClick={()=>setMobileView("preview")}>Preview</button>
                </>
              ) : (
                ["edit","split","preview"].map(v=>(
                  <button key={v} className={`view-btn vb ${view===v?"a":""}`} onClick={()=>setView(v)}>{v==="edit"?"Editor":v==="split"?"Split":"Preview"}</button>
                ))
              )}
              <div className="divider-v"/>
              <button className="btn-export" onClick={exportPNG} disabled={exporting||!h2cReady}>
                {exporting?"Esportando...":"⬇ Scarica PNG"}
              </button>
            </div>
          </div>

          {/* ========== MAIN CONTENT ========== */}
          <div className="main-split">
            {/* Editor Panel */}
            {(isSmall ? mobileView==="edit" : view!=="preview") && (
              <div className={`editor-panel ${view==="split"?"split-mode":""}`} style={{flex:view==="split"?"0 0 55%":"1"}}>

                {/* Overflow warning */}
                {overflow && (
                  <div className="overflow-warning">
                    {"⚠"} Il contenuto eccede il frame (1920px) &mdash; riduci testo, bullet o dimensione font
                  </div>
                )}

                {/* Layout */}
                <div className="field-group">
                  <label className="lS">Layout</label>
                  <select value={ly} onChange={e=>up("layout",e.target.value)} className="iS">
                    {Object.entries(LAYOUTS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                  </select>
                </div>

                {/* Title */}
                <div className="field-group">
                  <label className="lS">Titolo <span style={{color:"#6b6b8a",fontWeight:400,textTransform:"none"}}>&mdash; {"{parola}"} per evidenziare</span></label>
                  <textarea rows={2} value={d.title} onChange={e=>up("title",e.target.value)} className="iS"/>
                </div>
                <div className="field-group">
                  <label className="lS">Dim. titolo: {d.titleSize}px</label>
                  <input type="range" min={50} max={110} value={d.titleSize||78} onChange={e=>up("titleSize",+e.target.value)} style={{width:"100%",accentColor:"#c850c0"}}/>
                </div>

                {/* Subtitle */}
                <div className="field-group">
                  <label className="lS">Sottotitolo (opzionale)</label>
                  <input value={d.subtitle||""} onChange={e=>up("subtitle",e.target.value)} className="iS"/>
                </div>

                {/* Bullets */}
                {showBullets && (
                  <div style={{marginBottom:16}}>
                    <label className="lS">Bullet Points</label>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {(d.bullets||[]).map((b,i)=>(
                        <div key={i}
                          className={`bullet-row${dragOverIdx===i && dragIdx!==i?" drag-over":""}`}
                          draggable
                          onDragStart={()=>setDragIdx(i)}
                          onDragOver={(e)=>{e.preventDefault();setDragOverIdx(i)}}
                          onDragEnd={onBulletDragEnd}
                          onDrop={(e)=>e.preventDefault()}
                          style={{display:"flex",gap:4,alignItems:"center",borderTop:"2px solid transparent",opacity:dragIdx===i?0.4:1}}>
                          <span className="bullet-drag-handle">{"⠿"}</span>
                          <input value={b} onChange={e=>upB(i,e.target.value)} className="iS" style={{flex:1}}/>
                          <button className="btn-remove" onClick={()=>rmB(i)}>&times;</button>
                        </div>
                      ))}
                      <button className="btn-add-bullet" onClick={addB}>+ Aggiungi</button>
                    </div>
                  </div>
                )}

                {/* Body Font Size */}
                <div className="field-group">
                  <label className="lS">Dim. testo paragrafi: {d.bodyFontSize||34}px</label>
                  <input type="range" min={31} max={44} value={d.bodyFontSize||34} onChange={e=>up("bodyFontSize",+e.target.value)} style={{width:"100%",accentColor:"#c850c0"}}/>
                </div>

                {/* Bullet Font Size */}
                {showBullets && (
                  <div className="field-group">
                    <label className="lS">Dim. testo bullet: {d.bulletFontSize||36}px</label>
                    <input type="range" min={31} max={44} value={d.bulletFontSize||36} onChange={e=>up("bulletFontSize",+e.target.value)} style={{width:"100%",accentColor:"#c850c0"}}/>
                  </div>
                )}

                {/* Par1 */}
                <div className="field-group">
                  <label className="lS">Paragrafo 1 <span style={{color:"#6b6b8a",fontWeight:400,textTransform:"none"}}>&mdash; {"{parola}"} per colore</span></label>
                  <textarea rows={3} value={d.par1||""} onChange={e=>up("par1",e.target.value)} className="iS"/>
                </div>

                {/* Par2 */}
                <div className="field-group">
                  <label className="lS">Paragrafo 2</label>
                  <textarea rows={3} value={d.par2||""} onChange={e=>up("par2",e.target.value)} className="iS"/>
                </div>

                {/* Par3 */}
                {showPar3 && (
                  <div className="field-group">
                    <label className="lS">Paragrafo 3</label>
                    <textarea rows={3} value={d.par3||""} onChange={e=>up("par3",e.target.value)} className="iS"/>
                  </div>
                )}

                {/* Image */}
                <div className="field-group">
                  <label className="lS">Immagine {ly==="C" && <span style={{color:"#ff4757"}}>(non usata in layout C)</span>}</label>
                  <div style={{display:"flex",gap:8}}>
                    <button className="btn-sm" onClick={()=>fileRef.current?.click()}>Carica</button>
                    {d.imageUrl && <button onClick={()=>up("imageUrl","")} style={{padding:"8px 14px",borderRadius:8,border:"none",background:"transparent",color:"#ff4757",fontSize:12,cursor:"pointer",fontWeight:600}}>Rimuovi</button>}
                  </div>
                  <input ref={fileRef} type="file" accept="image/*" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>up("imageUrl",ev.target.result);r.readAsDataURL(f)}} style={{display:"none"}}/>
                </div>

                {/* Highlight Colors */}
                <div className="field-group">
                  <label className="lS">Colori evidenziazione</label>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    {colors.map((c,i)=>(
                      <input key={i} type="color" className="color-input" value={c} onChange={e=>{
                        const nc = [...colors]; nc[i] = e.target.value; setColors(nc);
                      }}/>
                    ))}
                    <button className="btn-sm" onClick={()=>setColors([...DEFAULT_COLORS])} style={{fontSize:10}}>Reset</button>
                  </div>
                </div>

                {/* Help */}
                <div className="help-box">
                  <span style={{color:"#c850c0"}}>{"{parola}"}</span> &rarr; evidenzia (titolo: barra gradient / paragrafi: colore gradient). Ogni <span style={{color:"#c850c0"}}>{"{}"}</span> alterna 3 colori.
                </div>
              </div>
            )}

            {/* Preview Panel */}
            {(isSmall ? mobileView==="preview" : view!=="edit") && (
              <div className="preview-panel">
                <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setFullscreen(true)}>
                  {overflow && <div className="overflow-badge">ECCEDE</div>}
                  <Preview d={d} pw={view==="split"?300:380} colors={colors}/>
                  <p style={{textAlign:"center",fontSize:10,color:"#4a4a6a",marginTop:10}}>1080&times;1920 &mdash; Click per fullscreen &mdash; Usa "Scarica PNG" per esportare</p>
                </div>
              </div>
            )}
          </div>

          {/* ========== HIDDEN FULL-SIZE FOR EXPORT ========== */}
          <div style={{position:"fixed",left:"-99999px",top:0,pointerEvents:"none",zIndex:-1}}>
            <Preview d={d} pw={1080} exportMode innerRef={exportRef} contentRef={overflowRef} colors={colors}/>
          </div>

          {/* ========== FULLSCREEN MODAL ========== */}
          {fullscreen && (
            <div className="fullscreen-overlay" onClick={()=>setFullscreen(false)}>
              <button className="fullscreen-close" onClick={()=>setFullscreen(false)}>&times;</button>
              <div onClick={e=>e.stopPropagation()} style={{maxHeight:"95vh",overflow:"auto"}}>
                <Preview d={d} pw={Math.min(500, window.innerWidth - 40)} colors={colors}/>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
